services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:ObschSbor2024Secure@db:5432/obschiysbor
      - JWT_SECRET=obschiysbor-jwt-secret-2024-production-change-me
      - DEBUG=false
      - CORS_ORIGINS=["https://everyone-assembled.ru","https://www.everyone-assembled.ru","http://82.38.60.192","http://localhost:5173"]
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: obschiysbor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ObschSbor2024Secure
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  pgdata:
  uploads:
  frontend_dist:
  certbot_www:
  certbot_certs:
